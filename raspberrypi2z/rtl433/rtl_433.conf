frequency   433.92M
sample_rate 250k
protocol    19
protocol    12
convert     si
report_meta time:iso:tz

# Salida a Mosquitto en la VM Docker. La plantilla de tópicos queda:
#   rtl_433/raspberrypi2z/devices/<model>/<channel>/<id>/<campo>
#   rtl_433/raspberrypi2z/events  (JSON por lectura, para TTato)
output mqtt://192.168.1.8:1883,retain=0,devices=rtl_433/raspberrypi2z/devices[/model][/channel][/id],events=rtl_433/raspberrypi2z/events
